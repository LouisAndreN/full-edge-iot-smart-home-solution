#!/usr/sbin/nft -f

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority filter; policy drop;

        iifname "lo" accept
        ct state { established, related } accept

        # SSH（LANからのみ）
        iifname "eth0" ip saddr 192.168.0.0/24 tcp dport 22 accept comment "SSH LAN"

        # IoTセンサー用（センサー追加時に有効化）
        #iifname "wlx0013eff27090" tcp dport 1883 accept comment "MQTT センサー"
        #iifname "wlx0013eff27090" tcp dport 8086 accept comment "InfluxDB センサー"
        
        iifname "wlx0013eff27090" udp dport 67 accept comment "DHCP センサー"
        iifname "wlx0013eff27090" udp dport 53 accept comment "DNS センサー"

        # ICMP
        icmp type echo-request accept comment "Ping デバッグ"

        log prefix "NFT-DROP: " flags all counter drop
    }

    chain forward {
        type filter hook forward priority filter; policy drop;

        # IoT → LANを完全遮断
        iifname "wlx0013eff27090" oifname "eth0" ip daddr 192.168.0.0/24 drop comment "IoT → LAN 遮断"

        # IoT → インターネット
        iifname "wlx0013eff27090" oifname "eth0" ct state { new, established, related } accept comment "IoT → Internet"

        # 確立済み通信の戻りトラフィック
        iifname "eth0" oifname "wlx0013eff27090" ct state { established, related } accept
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}

table ip nat {
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;
        iifname "wlx0013eff27090" oifname "eth0" masquerade comment "NAT IoT → Internet"
    }
}
