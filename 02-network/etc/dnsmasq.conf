# IoT専用インターフェース
interface=wlx0013eff27090
bind-interfaces

# センサー用DHCP
dhcp-range=192.168.200.100,192.168.200.200,255.255.255.0,24h

# センサー用ゲートウェイとDNS（Pi自身）
dhcp-option=option:router,192.168.200.1
dhcp-option=option:dns-server,192.168.200.1

# Unboundへ転送（外部DNSサーバーは使用しない）
server=127.0.0.1#5335
no-resolv

# DHCPログ
log-dhcp
