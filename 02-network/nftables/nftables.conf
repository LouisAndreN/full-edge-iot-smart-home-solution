#!/usr/sbin/nft -f

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority filter; policy drop;

        # ループバックと確立済み接続を許可
        iifname "lo" accept
        ct state { established, related } accept

        # NetBird WireGuard 制御ポート
        udp dport 51820 accept comment "NetBird WireGuard"

        # SSH - LANおよびNetBirdからのみ
        iifname "eth0" ip saddr 192.168.0.0/24 tcp dport 22 accept comment "SSH LAN"
        iifname "wt0" tcp dport 22 accept comment "SSH NetBird"

        # IoTサブネットからeth0 IPへの直接アクセスをブロック
        iifname "wlx0013eff27090" ip daddr 192.168.0.151 drop comment "Block Pi eth0 from IoT"

        # IoTサービス - IoTサブネットからのみ（センサー追加時に有効化）
        iifname "wlx0013eff27090" udp dport 67 accept comment "DHCP センサー"
        iifname "wlx0013eff27090" udp dport 53 accept comment "DNS センサー"

        # デバッグ用ICMP（レート制限）
        icmp type echo-request limit rate 5/second accept comment "Ping デバッグ"

        log prefix "NFT-DROP-INPUT: " flags all counter drop comment "Input drop log"
    }

    chain forward {
        type filter hook forward priority filter; policy drop;

        # IoT → LAN完全遮断
        iifname "wlx0013eff27090" oifname "eth0" ip daddr 192.168.0.0/24 drop comment "Block IoT → LAN"

        # 厳格なegress：IoTからのアウトバウンドをOTA必要最低限に制限
        # NTP → 時刻同期（HTTPS OTAに必要）
        iifname "wlx0013eff27090" oifname "eth0" udp dport 123 accept comment "NTP outbound"

        # HTTPS → OTA、ファームウェア、ライブラリ更新用
        iifname "wlx0013eff27090" oifname "eth0" tcp dport 443 accept comment "HTTPS outbound"

        # HTTP → レガシーOTA用（後でドロップ可能）
        iifname "wlx0013eff27090" oifname "eth0" tcp dport 80 accept comment "HTTP outbound"

        # ICMP outbound（Internetへのping）
        iifname "wlx0013eff27090" oifname "eth0" icmp type echo-request accept comment "ICMP outbound"

        # 許可済みアウトバウンドの戻りトラフィック
        iifname "eth0" oifname "wlx0013eff27090" ct state { established, related } accept comment "Return traffic"

        # それ以外のIoTアウトバウンドをすべてドロップ
        iifname "wlx0013eff27090" oifname "eth0" drop comment "Strict egress drop"

        log prefix "NFT-DROP-FORWARD: " flags all counter drop comment "Forward drop log"
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}
