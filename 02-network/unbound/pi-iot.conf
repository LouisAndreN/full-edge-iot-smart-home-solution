server:
    # ローカルのみでリッスン
    interface: 127.0.0.1
    port: 5335

    # パフォーマンス
    prefetch: yes
    cache-min-ttl: 3600
    cache-max-ttl: 86400

    # セキュリティ
    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: yes

    # ログ
    verbosity: 1
